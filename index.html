<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Waseem Agency</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{font-family:Poppins;margin:0;background:#0f1115;color:#fff}
header{display:flex;justify-content:space-between;padding:15px 30px;background:#111}
nav a{color:#fff;margin:0 10px;text-decoration:none}

.section{padding:80px 20px;text-align:center}

.hero h2{font-size:60px}

.btn{padding:12px 20px;border:none;border-radius:20px;cursor:pointer;margin:5px}
.btn-blue{background:#0077FF;color:white}

input,textarea{
width:90%;
padding:12px;
margin:10px;
border-radius:10px;
border:none;
}

.card{
background:#1a1d23;
padding:20px;
border-radius:12px;
margin:15px auto;
max-width:500px;
}

.gallery{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px}
.gallery img{width:100%;cursor:pointer;border-radius:10px}

.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#000;z-index:999;overflow:auto}
.modal-content{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;padding:40px}

.preview{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:black;justify-content:center;align-items:center}
.preview img{max-width:90%}
.arrow{position:absolute;font-size:50px;color:white;cursor:pointer}
#prevBtn{left:20px} #nextBtn{right:20px}
</style>
</head>

<body>

<header>
<h2>Waseem Agency</h2>
<nav>
<a href="#home">Home</a>
<a href="#portfolio">Portfolio</a>
<a href="#contact">Contact</a>
<a href="#dashboard">Dashboard</a>
</nav>
</header>

<!-- HOME -->
<section id="home" class="section hero">
<h2>Luxury Creative Agency</h2>
<p>Turning ideas into high-converting content</p>
</section>

<!-- PORTFOLIO -->
<section id="portfolio" class="section">
<h2>Portfolio</h2>
<div class="gallery">
<img src="Immage gallery.png" onclick="openImages()">
<img src="Videos Thumbnail.PNG" onclick="openVideos()">
</div>
</section>

<!-- CONTACT -->
<section id="contact" class="section">
<h2>Contact Me</h2>

<input type="text" id="name" placeholder="Your Name">
<input type="email" id="email" placeholder="Your Email">
<textarea id="message" placeholder="Your Message"></textarea>

<button class="btn btn-blue" onclick="submitForm()">Send Message</button>
</section>

<!-- DASHBOARD -->
<section id="dashboard" class="section">
<h2>Client Dashboard</h2>
<div id="messages"></div>
</section>

<!-- IMAGE MODAL -->
<div id="imageModal" class="modal" onclick="closeModal(event)">
<div class="modal-content">
<img src="FBB 01 .jpg" onclick="preview(this.src)">
<img src="FBB 02.png" onclick="preview(this.src)">
<img src="GRID SMP 01.jpg" onclick="preview(this.src)">
<img src="GRID SMP 02.png" onclick="preview(this.src)">
</div>
</div>

<!-- VIDEO MODAL -->
<div id="videoModal" class="modal" onclick="closeModal(event)">
<div class="modal-content">
<iframe width="100%" height="200" src="https://www.youtube.com/embed/yLaNjHdaavY"></iframe>
</div>
</div>

<!-- PREVIEW -->
<div id="preview" class="preview" onclick="closePreview(event)">
<span id="prevBtn" class="arrow">❮</span>
<img id="previewImg">
<span id="nextBtn" class="arrow">❯</span>
</div>

<script>
let images=[];
let currentIndex=0;

/* FORM SYSTEM */
function submitForm(){
let name=document.getElementById('name').value;
let email=document.getElementById('email').value;
let message=document.getElementById('message').value;

if(!name||!email||!message){
alert("Please fill all fields");
return;
}

let data={name,email,message};

let stored=JSON.parse(localStorage.getItem("clients"))||[];
stored.push(data);
localStorage.setItem("clients",JSON.stringify(stored));

loadMessages();

document.getElementById('name').value="";
document.getElementById('email').value="";
document.getElementById('message').value="";
}

function loadMessages(){
let container=document.getElementById('messages');
container.innerHTML="";

let stored=JSON.parse(localStorage.getItem("clients"))||[];

stored.forEach(client=>{
container.innerHTML+=`
<div class="card">
<h3>${client.name}</h3>
<p>${client.email}</p>
<p>${client.message}</p>
</div>`;
});
}

window.onload=loadMessages;

/* MODALS */
function openImages(){
document.getElementById('imageModal').style.display='block';
images=[...document.querySelectorAll('#imageModal img')].map(i=>i.src);
}

function openVideos(){
document.getElementById('videoModal').style.display='block';
}

function closeModal(e){
if(e.target!==e.currentTarget)return;
e.currentTarget.style.display='none';
}

/* PREVIEW */
function preview(src){
document.getElementById('preview').style.display='flex';
document.getElementById('previewImg').src=src;
currentIndex=images.indexOf(src);
}

function showNext(){
currentIndex=(currentIndex+1)%images.length;
document.getElementById('previewImg').src=images[currentIndex];
}

function showPrev(){
currentIndex=(currentIndex-1+images.length)%images.length;
document.getElementById('previewImg').src=images[currentIndex];
}

document.getElementById('nextBtn').onclick=showNext;
document.getElementById('prevBtn').onclick=showPrev;

function closePreview(e){
if(e.target.id==='previewImg')return;
document.getElementById('preview').style.display='none';
}
</script>

</body>
</html>
