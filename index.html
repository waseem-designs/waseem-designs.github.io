<!DOCTYPE html>
<html>
<head>
<title>Waseem Designs</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #0f172a;
  color: white;
}

header {
  text-align: center;
  padding: 40px;
  background: linear-gradient(135deg, #1e3a8a, #2563eb);
}

h1 {
  margin: 0;
}

.section {
  padding: 40px 20px;
  text-align: center;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap: 15px;
  max-width: 1000px;
  margin: auto;
}

img {
  width: 100%;
  border-radius: 10px;
}

.video {
  max-width: 900px;
  margin: 20px auto;
}

iframe {
  width: 100%;
  height: 400px;
  border-radius: 10px;
}

.button {
  display: inline-block;
  padding: 12px 20px;
  margin: 10px;
  background: #2563eb;
  color: white;
  border-radius: 8px;
  text-decoration: none;
}

footer {
  text-align: center;
  padding: 30px;
  background: #020617;
}
</style>

</head>

<body>

<header>
<h1>Waseem Designs</h1>
<p>Professional Thumbnail & Graphic Designer</p>

<a href="mailto:your@email.com" class="button">Contact Me</a>
</header>

<div class="section">
<h2>My Work</h2>

<div class="grid">
<img src="Thumbnails 01.jpg">
<img src="Thumbnails 02.jpg">
<img src="Thumbnails 03.png">
<img src="Youtube Banners 01.jpg">
<img src="Youtube Banners 02.jpg">
<img src="Youtube Banners 03.jpg">
<img src="Restaurant Promo.jpg">
<img src="Corporate Promo.jpg">
</div>
</div>

<div class="section">
<h2>Video Work</h2>

<div class="video">
<iframe src="https://www.youtube.com/embed/yLaNjHdaavY"></iframe>
</div>

<div class="video">
<iframe src="https://www.youtube.com/embed/PnxW_Ctmsts"></iframe>
</div>

</div>

<footer>
<p>© Waseem Designs</p>
</footer>

</body>
</html>
